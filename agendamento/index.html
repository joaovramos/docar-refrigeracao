<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento de Serviços | DOCAR Recife</title>
  <meta name="description" content="Agende atendimento na DOCAR Refrigeração Automotiva em Recife, Caxangá. Escolha horário ou fale direto pelo WhatsApp.">

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/docar-refrigeracao/assets/css/style.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MEASUREMENT_ID"></script>
  <script src="/docar-refrigeracao/assets/js/ga4.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <img src="/docar-refrigeracao/assets/img/logo.png" alt="DOCAR Refrigeração Automotiva" class="logo">
      <nav class="menu">
        <a href="/docar-refrigeracao/">Início</a>
        <a href="/docar-refrigeracao/servicos/">Serviços</a>
        <a href="/docar-refrigeracao/catalogo/">Catálogo</a>
        <a href="/docar-refrigeracao/agendamento/">Agendamento</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="section-light">
      <div class="container">
        <h1>Agendamento de serviços</h1>
        <p>Em breve você poderá escolher um horário diretamente pelo calendário online.</p>

        <!-- QUANDO TIVER O LINK DO CALENDLY, SUBSTITUIR ABAIXO -->
        <!-- Exemplo de embed:
        <div class="calendly-inline-widget"
             data-url="https://calendly.com/SEU_USUARIO/avaliacao-ar-docar"
             style="min-width:320px;height:700px;"></div>
        <script type="text/javascript"
                src="https://assets.calendly.com/assets/external/widget.js"
                async></script>
        -->

        <p>Enquanto isso, agende pelo WhatsApp da DOCAR.</p>
        <button class="btn-cta"
                onclick="handleWhatsAppClick('agendamento_whatsapp','Quero agendar horário na DOCAR para avaliar o ar condicionado do meu carro.');">
          Agendar pelo WhatsApp
        </button>
      </div>
    </section>

    <button class="whatsapp-float"
            onclick="handleWhatsAppClick('whatsapp_flutuante_agendamento','');">
      <img src="/assets/img/icones/whatsapp.svg" alt="">
    </button>
  </main>

  <script src="/docar-refrigeracao/assets/js/main.js"></script>
</body>
</html>
